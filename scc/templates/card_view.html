<!DOCTYPE html>
<html>
    <head>
        <title>{{ card_name }}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="apple-touch-icon" href="/static/touch-icon-iphone.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/static/touch-icon-iphone-retina.png">
        <link rel="stylesheet" href="/static/style.css">
        <link rel="stylesheet" href="/static/card_metadata.css">
        <meta id="card-geom"
            data-orig-x="{{ orig_x }}"
            data-orig-y="{{ orig_y }}"
            data-off-x="{{ off_x }}"
            data-off-y="{{ off_y }}"
            data-card='{{ card_data_json }}'>
        <script src="/static/card_renderer.js"></script>
        <script src="/static/card_metadata.js"></script>
        <script>
            const cardGeom = document.getElementById("card-geom").dataset;
            const CARD_DATA = JSON.parse(cardGeom.card || 'null');

            document.addEventListener("DOMContentLoaded", function () {
                var renderer = window.CardRenderer.createRenderer({ holeSize: 15 });
                renderer.renderCard(CARD_DATA);
                window.CardMetadata.highlightPreformattedJson('metadata-json');
            });
        </script>
        <style>
        html {
            background-color: #2a2a2a;
            color: white;
        }
        body {
            padding: 0;
            background: #2a2a2a;
        }
        .nav {
            padding: 10px;
            display: flex;
            align-items: center;
        }
        .nav a {
            white-space: nowrap;
        }
        .nav h1.card-title {
            flex: 1;
            text-align: center;
            margin: 0;
            font-size: 1em;
            color: #ccc;
        }
        #card {
            width: 100%;
            height: auto;
            display: block;
        }
        .card-nav {
            margin-left: auto;
            display: flex;
            gap: 12px;
            font-size: 1.4em;
            font-weight: bold;
        }
        .card-nav .nav-disabled {
            color: #555;
        }
        </style>
    </head>
    <body>
        <div class="nav">
            <a href="/bins">Back to binned cards</a>
            <!-- <h1 class="card-title">{{ card_name }}</h1> -->
            <div class="card-nav">
                {% if prev_card %}<a href="/card/{{ prev_card }}">&larr;</a>{% else %}<span class="nav-disabled">&larr;</span>{% endif %}
                {% if next_card %}<a href="/card/{{ next_card }}">&rarr;</a>{% else %}<span class="nav-disabled">&rarr;</span>{% endif %}
            </div>
        </div>
        <canvas id="card"></canvas>
        {% include '_card_metadata_panel.html' %}
    </body>
</html>
