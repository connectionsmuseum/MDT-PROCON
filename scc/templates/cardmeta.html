<!DOCTYPE html>
<html>
    <head>
        <title>Card Metadata</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="apple-touch-icon" href="../static/touch-icon-iphone.png">
        <link rel="apple-touch-icon" sizes="180x180" href="../static/touch-icon-iphone-retina.png">
        <link rel="stylesheet" href="/static/style.css">
        <script src="/static/card_metadata.js"></script>
        
        <script>
        document.addEventListener('DOMContentLoaded', function () {
            window.CardMetadata.highlightPreformattedJson('metadata-json');
        });
        </script>

        <style>
            body {
                padding: 18px;
            }
            h1 {
                margin: 0 0 12px;
                font-size: 1.2rem;
            }
            pre {
                margin: 0;
                padding: 14px;
                border: 1px solid #444;
                border-radius: 6px;
                background: #111;
                color: #d9f0ff;
                overflow: auto;
                line-height: 1.35;
            }
            .string { color: #98c379; }
            .number { color: #d19a66; }
            .boolean { color: #61afef; }
            .null { color: #c678dd; }
            .key { color: #e06c75; }
            .top-nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        </style>
    </head>
    <body>
        <div class="top-nav">
            <div>
                <a href="/bins">Back to bins</a>
            </div>
            <div>
                <a href="/cardmeta/{{ card_name }}">Raw JSON</a>
            </div>
        </div>

        <h1>Metadata for {{ card_name }}</h1>

        {% if pretty_json %}
            <pre id="metadata-json">{{ pretty_json }}</pre>
        {% else %}
            <p>Metadata not found for this card.</p>
        {% endif %}
    </body>
</html>
