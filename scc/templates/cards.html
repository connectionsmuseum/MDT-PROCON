<!DOCTYPE html>
<html>
    <head>
        <title>Trouble Cards</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="apple-touch-icon" href="../static/touch-icon-iphone.png">
        <link rel="apple-touch-icon" sizes="180x180" href="../static/touch-icon-iphone-retina.png">
        <meta id="card-geom"
            data-orig-x="{{ orig_x }}"
            data-orig-y="{{ orig_y }}"
            data-off-x="{{ off_x }}"
            data-off-y="{{ off_y }}">
        <script>
            // Punch geometry from cardpack/offsets.txt via data attributes.
            const cardGeom = document.getElementById("card-geom").dataset;
            const CARD_ORIG_X = parseFloat(cardGeom.origX);
            const CARD_ORIG_Y = parseFloat(cardGeom.origY);
            const CARD_OFF_X  = parseFloat(cardGeom.offX);
            const CARD_OFF_Y  = parseFloat(cardGeom.offY);
            const HOLE_SIZE   = 15; // px in original image coords

            let blankCardImage = null;
            let placeholderImage = null;

            // lazy loading time
            function ensureBlankCard(callback) {
                if (blankCardImage) { callback(blankCardImage); return; }
                const img = new Image();
                img.onload = function () { blankCardImage = img; callback(img); };
                img.src = '/blank-card';
            }

            function ensurePlaceholder(callback) {
                if (placeholderImage) { callback(placeholderImage); return; }
                const img = new Image();
                img.onload = function () { placeholderImage = img; callback(img); };
                img.src = '/static/placeholder.png';
            }

            function renderPlaceholder() {
                ensurePlaceholder(function (img) {
                    const canvas = document.getElementById('card');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    ctx.drawImage(img, 0, 0);
                });
            }

            // ok lets render a card! this is the main event. 
            // the cardData.z_card is a 2d array of booleans representing punched holes, 
            // which we render as black circles on top of the blank card image
            function renderCard(cardData) {
                try {       // throw this whole thing in a try block to catch errors
                    ensureBlankCard(function (img) {
                        const canvas = document.getElementById('card');
                        const ctx = canvas.getContext('2d');
                        canvas.width  = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        ctx.drawImage(img, 0, 0);
                        if (!cardData || !cardData.z_card) return;
                        const bits = cardData.z_card;
                        ctx.fillStyle = 'black';
                        for (let xidx = 0; xidx < 69; xidx++) {
                            if (xidx > 30 && xidx < 38) continue; // middle gap
                            for (let yidx = 0; yidx < 18; yidx++) {
                                // It's hole punchin' time. KACHUKACHUKA!
                                if (bits[yidx][xidx]) {
                                    const cx = CARD_ORIG_X + xidx * CARD_OFF_X;
                                    const cy = CARD_ORIG_Y + yidx * CARD_OFF_Y;
                                    ctx.beginPath();
                                    ctx.arc(cx, cy, HOLE_SIZE, 0, Math.PI * 2);
                                    ctx.fill();
                                }
                            }
                        }
                    });
                } catch (err) {
                    console.error('Error rendering card:', err);
                    renderPlaceholder();
                }
            }

            function loadLatestCard() {
                fetch('/latest-card-data')
                    .then(r => { if (!r.ok) throw new Error('no data'); return r.json(); })
                    .then(data => renderCard(data))
                    .catch(() => renderPlaceholder()); // show claire's placeholder if no card data available
            }

            function loadCard() {
                // called when a card is selected from the dropdown
                const name = document.getElementById("cardSelect").value;
                if (!name) {
                    renderPlaceholder();
                    return;
                }
                fetch('/cardmeta/' + name)
                    .then(r => r.json())
                    .then(data => renderCard(data))
                    .catch(err => {
                        console.error('Error loading card:', err);
                        renderPlaceholder(); // show claire's placeholder if card data cannot be loaded
                    });
            }

            function refreshCardDropdown(selectNewest = false) {
                return fetch('/cardnames')
                    .then(response => response.json())
                    .then(entries => {
                        const select = document.getElementById('cardSelect');
                        const previous = select.value;
                        select.innerHTML = '';
                        entries.forEach(entry => {
                            const option = document.createElement('option');
                            option.value = entry.name;
                            option.textContent = entry.date;
                            select.appendChild(option);
                        });

                        // keep the last item of the dropdown empty
                        const emptyOption = document.createElement('option');
                        select.appendChild(emptyOption);

                        if (selectNewest && entries.length > 0) {
                            select.value = entries[0].name;
                            return;
                        }

                        const hasPrevious = Array.from(select.options).some(o => o.value === previous);
                        if (hasPrevious) {
                            select.value = previous;
                        }
                    })
                    .catch(error => console.error('Error fetching cardnames:', error));
            }

            document.addEventListener("DOMContentLoaded", function () {
                const statusDot = document.getElementById("statusDot");
                const evtSource = new EventSource("/events");
                const checkbox  = document.getElementById("autoRefresh");

                statusDot.addEventListener("click", function () {
                    location.reload(); location.href = "/bins";
                });

                // Restore saved setting (default: true if nothing stored)
                const saved = localStorage.getItem("autoRefresh");
                checkbox.checked = saved === null ? true : (saved === "true");

                checkbox.addEventListener("change", function () {
                    localStorage.setItem("autoRefresh", checkbox.checked);
                });

                // listener for server-sent events; re-render card on "update" if auto-refresh enabled
                evtSource.onmessage = function (event) {
                    const canvas = document.getElementById("card");
                    if (event.data === "update") {
                        console.log("UPDATE GET!");
                        if (checkbox.checked) {
                            refreshCardDropdown(true);
                            // Trigger flash
                            canvas.classList.remove("flash");
                            void canvas.offsetWidth; // force reflow (important for some reason)
                            canvas.classList.add("flash");
                            loadLatestCard();
                        } else {
                            refreshCardDropdown();
                        }
                    }
                };

                evtSource.onopen = function () {
                    console.log("SSE OPEN");
                    statusDot.classList.remove("disconnected");
                    statusDot.classList.add("connected");
                };
                evtSource.onerror = function () {
                    console.log("SSE ERROR", evtSource.readyState);
                    statusDot.classList.remove("connected");
                    statusDot.classList.add("disconnected");
                };

                // Render the most recent card on initial page load
                refreshCardDropdown();
                loadLatestCard();
            });
        </script>
        <style>
        html,
        img {
            background-color: #2a2a2a;
        }
        html {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Roboto, Helvetica, Arial, sans-serif;
                 color: white;
                 font-size: 12px;
        }
        #card {
            width: 100%;
            height: auto;
            display: block;
            border: 3px solid transparent;
            transition: opacity 0.2s ease;
        }

        @keyframes fadePulse {
            0%   { opacity: 1; }
            40%  { opacity: 0.15;}
            100% { opacity: 1; }
        }

        #card.flash {
            animation: fadePulse 0.4s ease;
        }
        .controls {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding-bottom: 10px;
            gap: 10px;
        }
        .controls label {
            display: flex;         /* keeps checkbox + text inline */
            align-items: center;
            gap: 6px;              /* spacing between box and text */
            cursor: pointer;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            margin-right: 10px;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
            transition: all 0.3s ease-in-out;
        }
        @keyframes rainbowSpin {
            0%   { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .status-dot:hover {
            animation: rainbowSpin 1.2s linear infinite;
        }

        /* Connected (green) */
        .status-dot.connected {
            background-color: #00cc44;
            box-shadow: 0 0 6px #00cc44;
        }

        /* Disconnected (red) */
        .status-dot.disconnected {
            background-color: #cc0033;
            box-shadow: 0 0 6px #cc0033;
        }
        </style>
    </head>
    <body>
        <div class="controls">
            <select name="card" id="cardSelect" onchange="loadCard()">
                {% for card in card_entries %}
                <option value="{{card.name}}">
                    {{card.date}}
                </option>
                {% endfor %}
                <option></option>
            </select>
            <label>
                <input type="checkbox" id="autoRefresh" checked>  
                Auto-refresh on new card
            </label> 
            <div class="rightcontrols">
                <span id="statusDot" class="status-dot disconnected" title="Connection status (click to open bins)"></span>
                <button onClick="window.location.reload();">Reload Page</button>
            </div>
        </div>
        <canvas id="card"></canvas>
    </body>
</html>
