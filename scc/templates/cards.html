<!DOCTYPE html>
<html>
    <head>
        <title>Trouble Cards</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="apple-touch-icon" href="../static/touch-icon-iphone.png">
        <link rel="apple-touch-icon" sizes="180x180" href="../static/touch-icon-iphone-retina.png">
        <script>
            function loadCard() {
                // used only when a card is selected from the dropdown.
                // loads a card from somewhere below the top of the stack
                const name = document.getElementById("cardSelect").value;
                var img = document.getElementById("card");
                img.src = "card/" + name;
                console.log("older card loaded");
            }
            document.addEventListener("DOMContentLoaded", function () {
                const statusDot = document.getElementById("statusDot");
                const evtSource = new EventSource("/events");
                const checkbox = document.getElementById("autoRefresh");

                // Restore saved setting (default: true if nothing stored)
                const saved = localStorage.getItem("autoRefresh");
                checkbox.checked = saved === null ? true : (saved === "true");

                // Save whenever user changes it
                checkbox.addEventListener("change", function () {
                    localStorage.setItem("autoRefresh", checkbox.checked);
                });
                
                // listener for server-sent events; reload image on "update" if auto-refresh enabled
                evtSource.onmessage = function(event) {
                    const img = document.getElementById("card");
                    if (event.data === "update" && checkbox.checked) {  
                        console.log("UPDATE GET!");
                        img.src = "static/front.jpg?t=" + Date.now(); // bust-a-cache
                        // Trigger flash
                        img.classList.remove("flash");   // reset if already applied
                        void img.offsetWidth;            // force reflow (important for some reason)
                        img.classList.add("flash");
                    }
                }
                // Update status dot based on connection state
                evtSource.onopen = function() {
                    console.log("SSE OPEN");
                    statusDot.classList.remove("disconnected");
                    statusDot.classList.add("connected");
                };
                evtSource.onerror = function() {
                    console.log("SSE ERROR", evtSource.readyState);
                    statusDot.classList.remove("connected");
                    statusDot.classList.add("disconnected");
                };

            });
        </script>
        <style>
        html,
        img {
            background-color: #2a2a2a;
        }
        html {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Roboto, Helvetica, Arial, sans-serif;
                 color: white;
                 font-size: 12px;
        }
        #card {
            width: 100%;
            border: 3px solid transparent;
            transition: opacity 0.2s ease;
        }

        @keyframes fadePulse {
            0%   { opacity: 1; }
            40%  { opacity: 0.15;}
            100% { opacity: 1; }
        }

        #card.flash {
            animation: fadePulse 0.4s ease;
        }
        .controls {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding-bottom: 10px;
            gap: 10px;
        }
        .controls label {
            display: flex;         /* keeps checkbox + text inline */
            align-items: center;
            gap: 6px;              /* spacing between box and text */
            cursor: pointer;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            margin-right: 10px;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
            transition: all 0.3s ease-in-out;
        }
        @keyframes rainbowSpin {
            0%   { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .status-dot:hover {
            animation: rainbowSpin 1.2s linear infinite;
        }

        /* Connected (green) */
        .status-dot.connected {
            background-color: #00cc44;
            box-shadow: 0 0 6px #00cc44;
        }

        /* Disconnected (red) */
        .status-dot.disconnected {
            background-color: #cc0033;
            box-shadow: 0 0 6px #cc0033;
        }
        </style>
    </head>
    <body>
        <div class="controls">
            <select name="card" id="cardSelect" onchange="loadCard()">
                {% for cardname in cardnames %}
                <option value="{{cardname}}">
                    {{cardname}}
                </option>
                {% endfor %}
                <option></option>
            </select>
            <label>
                <input type="checkbox" id="autoRefresh" checked>  
                Auto-refresh on new card
            </label> 
            <div class="rightcontrols">
                <span id="statusDot" class="status-dot disconnected" title="Connection status"></span>
                <button onClick="window.location.reload();">Reload Page</button>
            </div>
        </div>
        <img id="card" src="static/front.jpg" 
        onerror="this.src='static/placeholder.png';"/>
    </body>
</html>
