<!DOCTYPE html>
<html>
    <head>
        <title>Trouble Cards</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="apple-touch-icon" href="../static/touch-icon-iphone.png">
        <link rel="apple-touch-icon" sizes="180x180" href="../static/touch-icon-iphone-retina.png">
        <link rel="shortcut icon" href="../static/favicon.ico">
        <link rel="stylesheet" href="/static/style.css">
        <link rel="stylesheet" href="/static/card_metadata.css">

        <meta id="card-geom"
            data-orig-x="{{ orig_x }}"
            data-orig-y="{{ orig_y }}"
            data-off-x="{{ off_x }}"
            data-off-y="{{ off_y }}">
        <script src="/static/card_renderer.js"></script>
        <script src="/static/card_metadata.js"></script>
        <script>
            let renderer = null;
            let currentCardData = null;

            function updateBinName(cardData) {
                const binName = document.getElementById('currentBinName');
                if (!binName) {
                    return;
                }
                const value = cardData && cardData.metadata && cardData.metadata.bin;
                binName.textContent = value ? value : 'unknown';
            }

            function isHomeMetadataEnabled() {
                try {
                    return localStorage.getItem('displayCardMetadataHome') === 'true';
                } catch (err) {
                    return false;
                }
            }

            function syncMetadataPanel() {
                const enabled = isHomeMetadataEnabled();

                window.CardMetadata.setPanelVisibility('home-metadata-panel', enabled);
                if (!enabled) {
                    return;
                }

                window.CardMetadata.renderPanel('home-metadata-panel', currentCardData);
            }

            function setCard(data) {
                currentCardData = data;
                renderer.renderCard(data);
                updateBinName(data);
                syncMetadataPanel();
            }

            function clearCard() {
                currentCardData = null;
                renderer.renderPlaceholder();
                updateBinName(null);
                syncMetadataPanel();
            }

            function loadLatestCard() {
                fetch('/latest-card-data')
                    .then(r => { if (!r.ok) throw new Error('no data'); return r.json(); })
                    .then(setCard)
                    .catch(clearCard);
            }

            window.loadCard = function () {
                const name = document.getElementById("cardSelect").value;
                if (!name) {
                    clearCard();
                    return;
                }
                fetch('/cardmeta/' + name)
                    .then(r => r.json())
                    .then(setCard)
                    .catch(err => {
                        console.error('Error loading card:', err);
                        clearCard();
                    });
            };

            function refreshCardDropdown(selectNewest = false) {
                return fetch('/cardnames')
                    .then(response => response.json())
                    .then(entries => {
                        const select = document.getElementById('cardSelect');
                        const previous = select.value;
                        select.innerHTML = '';
                        entries.forEach(entry => {
                            const option = document.createElement('option');
                            option.value = entry.name;
                            option.textContent = entry.date;
                            select.appendChild(option);
                        });

                        // keep the last item of the dropdown empty
                        const emptyOption = document.createElement('option');
                        select.appendChild(emptyOption);

                        if (selectNewest && entries.length > 0) {
                            select.value = entries[0].name;
                            return;
                        }

                        const hasPrevious = Array.from(select.options).some(o => o.value === previous);
                        if (hasPrevious) {
                            select.value = previous;
                        }
                    })
                    .catch(error => console.error('Error fetching cardnames:', error));
            }

            document.addEventListener("DOMContentLoaded", function () {
                const statusDot = document.getElementById("statusDot");
                const evtSource = new EventSource("/events");
                renderer = window.CardRenderer.createRenderer({ holeSize: 15 });

                statusDot.addEventListener("click", function () {
                    window.location.href = 'credits';
                });

                function isAutoRefreshEnabled() {
                    try {
                        const saved = localStorage.getItem("autoRefresh");
                        return saved === null ? true : (saved === "true");
                    } catch (err) {
                        return true;
                    }
                }

                // listener for server-sent events; re-render card on "update" if auto-refresh enabled
                evtSource.onmessage = function (event) {
                    const canvas = document.getElementById("card");
                    if (event.data === "update") {
                        console.log("UPDATE GET!");
                        if (isAutoRefreshEnabled()) {
                            refreshCardDropdown(true);
                            // Trigger flash
                            canvas.classList.remove("flash");
                            void canvas.offsetWidth; // force reflow
                            canvas.classList.add("flash");
                            loadLatestCard();
                        } else {
                            refreshCardDropdown();
                        }
                    }
                };

                evtSource.onopen = function () {
                    console.log("SSE OPEN");
                    statusDot.classList.remove("disconnected");
                    statusDot.classList.add("connected");
                };
                evtSource.onerror = function () {
                    console.log("SSE ERROR", evtSource.readyState);
                    statusDot.classList.remove("connected");
                    statusDot.classList.add("disconnected");
                };

                // Render the most recent card on initial page load
                window.addEventListener('storage', function (event) {
                    if (event.key === 'displayCardMetadataHome') {
                        syncMetadataPanel();
                    }
                });

                syncMetadataPanel();
                refreshCardDropdown();
                loadLatestCard();
            });
        </script>
        <style>
        html,
        img {
            background-color: #2a2a2a;
        }
        html {
            color: white;
            font-size: 12px;
        }
        body {
            margin: 8px;
            padding: 0;
            background: #2a2a2a;
            line-height: normal;
        }
        #card {
            width: 100%;
            height: auto;
            display: block;
            border: 3px solid transparent;
            transition: opacity 0.2s ease;
        }

        @keyframes fadePulse {
            0%   { opacity: 1; }
            40%  { opacity: 0.15;}
            100% { opacity: 1; }
        }

        #card.flash {
            animation: fadePulse 0.4s ease;
        }
        .leftcontrols {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            align-items: center;
            padding-bottom: 10px;
            gap: 10px;
        }
        .card-select-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-self: start;
        }
        .bin-display {
            justify-self: center;
            text-align: center;
            white-space: nowrap;
            color: #ddd;
            font-size: 1.05em;
            font-weight: 600;
        }
        .bin-display .label {
            opacity: 0.75;
            font-weight: 500;
            margin-right: 6px;
        }
        .rightcontrols {
            justify-self: end;
            display: flex;
            align-items: center;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            margin-right: 10px;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
            transition: all 0.3s ease-in-out;
        }
        @keyframes rainbowSpin {
            0%   { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .status-dot:hover {
            animation: rainbowSpin 1.2s linear infinite;
        }

        /* Connected (green) */
        .status-dot.connected {
            background-color: #00cc44;
            box-shadow: 0 0 6px #00cc44;
        }

        /* Disconnected (red) */
        .status-dot.disconnected {
            background-color: #cc0033;
            box-shadow: 0 0 6px #cc0033;
        }

        @media (max-width: 900px) {
            .leftcontrols {
                grid-template-columns: 1fr;
            }
            .bin-display,
            .rightcontrols {
                justify-self: start;
            }
        }
        </style>
    </head>
    <body>
        <div class="leftcontrols">
            <div class="card-select-group">
                <select name="card" id="cardSelect" onchange="loadCard()">
                    {% for card in card_entries %}
                    <option value="{{card.name}}">
                        {{card.date}}
                    </option>
                    {% endfor %}
                    <option></option>
                </select>
                <a href="/bins">Card Bins</a>
                <a href="/settings">Settings</a>
            </div>
            <div class="bin-display">
                <span class="label">Bin:</span><span id="currentBinName">unknown</span>
            </div>
            <div class="rightcontrols">
                <span id="statusDot" class="status-dot disconnected" title="Connection status"></span>
                <button onClick="window.location.reload();">Reload Page</button>
            </div>
        </div>
        <canvas id="card"></canvas>
        {% with metadata_panel_id='home-metadata-panel', metadata_json_id='home-metadata-json', metadata_hidden=True %}
            {% include '_card_metadata_panel.html' %}
        {% endwith %}
    </body>
</html>
